name: PHP Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "*.x"

jobs:
  lint:
    name: PHP ${{ matrix.php-version }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.4"
          - "8.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Lint PHP sources
        run: git ls-files '*.php' | xargs -n 1 php -l

  unit:
    name: PHPUnit (Drupal ${{ matrix.drupal-core }} / PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.4"
            drupal-core: "^11.3"
          - php-version: "8.5"
            drupal-core: "^12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Resolve and install Drupal test dependencies
        run: composer update drupal/core drupal/core-dev --with-all-dependencies --prefer-dist --no-interaction

      - name: Run unit tests
        run: composer test:unit

  deprecations:
    name: Drupal deprecations (Drupal 12 / PHP 8.5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none

      - name: Resolve and install Drupal 12 dependencies
        run: composer update drupal/core drupal/core-dev --with-all-dependencies --prefer-dist --no-interaction

      - name: Run deprecation analysis
        run: composer test:deprecations
