name: PHP Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "*.x"

jobs:
  lint:
    name: PHP ${{ matrix.php-version }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.4"
          - "8.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Lint PHP sources
        run: git ls-files '*.php' | xargs -n 1 php -l

  phpcs:
    name: PHPCS (PHP 8.4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run PHP_CodeSniffer
        run: composer lint:phpcs

  unit:
    name: PHPUnit (Drupal ${{ matrix.drupal-label }} / PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.4"
            drupal-core: "^11.3"
            drupal-label: "^11.3"
          - php-version: "8.5"
            drupal-core: "12.x-dev@dev"
            drupal-label: "12.x-dev"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Pin Drupal test dependency line
        run: |
          composer require --no-update "drupal/core:${{ matrix.drupal-core }}"
          composer require --no-update "drupal/core-composer-scaffold:${{ matrix.drupal-core }}"
          composer require --dev --no-update "drupal/core-dev:${{ matrix.drupal-core }}"

      - name: Resolve and install Drupal test dependencies
        run: composer update --with-all-dependencies --prefer-dist --no-interaction

      - name: Run unit tests
        run: composer test:unit

  deprecations:
    name: Drupal deprecations (Drupal 12.x-dev / PHP 8.5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none

      - name: Pin Drupal 12 dependency line
        run: |
          composer require --no-update "drupal/core:12.x-dev@dev"
          composer require --no-update "drupal/core-composer-scaffold:12.x-dev@dev"
          composer require --dev --no-update "drupal/core-dev:12.x-dev@dev"

      - name: Resolve and install Drupal 12 dependencies
        run: composer update --with-all-dependencies --prefer-dist --no-interaction

      - name: Run deprecation analysis
        run: composer test:deprecations
