services:
  emulsify_tools.filesystem:
    class: Symfony\Component\Filesystem\Filesystem
  emulsify_tools.admin_theme_favicon_manager:
    class: Drupal\emulsify_tools\AdminThemeFaviconManager
    arguments: ['@router.admin_context', '@config.factory', '@file_url_generator', '@theme.manager', '@theme.settings']
  emulsify_tools.twig_attribute_manager:
    class: Drupal\emulsify_tools\TwigAttributeManager
  emulsify_tools.twig.emulsify_tools_add_attributes:
    class: Drupal\emulsify_tools\AddAttributesTwigExtension
    arguments: ['@emulsify_tools.twig_attribute_manager']
    parent: twig.extension
    tags:
      - { name: twig.extension }
  emulsify_tools.twig.emulsify_tools_bem:
    class: Drupal\emulsify_tools\BemTwigExtension
    arguments: ['@emulsify_tools.twig_attribute_manager']
    parent: twig.extension
    tags:
      - { name: twig.extension }
  emulsify_tools.subtheme_generator:
    class: Drupal\emulsify_tools\SubThemeGenerator
    arguments: ['@emulsify_tools.filesystem']
  emulsify_tools.twig.switch:
    class: Drupal\emulsify_tools\SwitchExtension
    tags:
      - { name: twig.extension }
